# =============================================================================
# Editor-machine profile (Heavy1-6) — overlay these settings on top of your
# normal config.yaml on each production machine.
#
# Goal: chip in on the transcode pool OVERNIGHT WHILE IDLE, on the NVIDIA GPU,
# using almost no disk — never disrupting an editor. It is fine for these
# machines to be slower than the dedicated box; the priority is staying out of
# the way. The dedicated 24/7 box (HEAVY7) keeps its normal config (none of
# the settings below).
#
# NOTE: dividing the SAME Dropbox pool safely between machines needs the
# cross-machine claim mechanism (separate work item). Until that ships, point
# these machines at their OWN folders to avoid two machines grabbing the same
# video.
# =============================================================================

# --- Use the NVIDIA GPU (these boxes have NVENC, not Intel QSV) ---------------
encoder_preference: nvenc

# --- Only work at night, and yield the instant an editor touches the machine -
availability:
  enabled: true
  night_start: "18:00"     # start of the safe window (local time)
  night_end: "09:00"       # stop before the editors arrive
  pause_when_user_active: true
  idle_minutes: 10         # no keyboard/mouse for 10 min before it starts
  check_interval_sec: 60

# --- Tread lightly on the disk (D: is the editors' 2 TB working drive) --------
# Both knobs are SMALL on purpose:
#   max_staging_bytes — hard ceiling on scratch the encoder uses at once. With
#     1 download + 1 transcode of 20-47 GB files, ~100 GB holds a file or two.
#   min_free_bytes — safety margin. If the drive already has less than this
#     free (editors filled it up), the encoder simply doesn't start — it steps
#     aside instead of pushing the disk toward full. This is NOT reserved
#     space; it's a "back off when the disk is tight" floor. Tune to whatever
#     headroom you want to guarantee the editors (e.g. 80-150 GB).
disk_budget:
  enabled: true
  max_staging_bytes: 100000000000     # ~100 GB scratch ceiling
  min_free_bytes:    100000000000     # back off if under ~100 GB free
  poll_interval_sec: 30

# --- Low concurrency so only a file or two sits on disk at a time -------------
concurrency:
  download_workers: 1
  transcode_workers: 1
  upload_workers: 1
