# HeavyDrops Transcoder — example configuration.
#
# Copy this file to config.yaml and edit. Either short-lived or refresh-token
# auth is required (see below).
#
# Auth, two modes:
#   1) Refresh token (recommended for the daemon — runs forever, never expires):
#      Run `hd auth` once. It walks you through Dropbox OAuth and writes
#      dropbox_app_key + dropbox_refresh_token here.
#   2) Short-lived access token (legacy / ad-hoc, ~4h lifetime):
#      Generate one at https://www.dropbox.com/developers/apps and paste it
#      into dropbox_token. The daemon will die when the token expires.
#
# dropbox_root:   a VIRTUAL path inside your Dropbox account (starts with "/").
#                 Use "/" to process your entire Dropbox, or "/Videos" etc.
#                 This is NOT your local Dropbox folder on disk.
# local_*_dir:    local paths on THIS machine. On Windows keep forward slashes
#                 (e.g. C:/Users/you/HeavyDrops/data/staging) to avoid YAML
#                 escape issues, or quote the path with single quotes.
# output_layout:  "sibling" writes next to each source folder at .../h265/name.mp4
#                 (legacy, default). "mirror" mirrors the tree under a single
#                 root folder — recommended for large archives with sibling
#                 folders that share filenames.
# disk_budget.enabled: flip to true when staging disk is a bottleneck (e.g.
#                 few TB local disk pointed at a huge Dropbox).

dropbox_token: ${DROPBOX_TOKEN}
dropbox_app_key: ''
dropbox_app_secret: ''
dropbox_refresh_token: ${DROPBOX_REFRESH_TOKEN}
dropbox_root: /Videos
local_staging_dir: /data/transcoder/staging
local_output_dir: /data/transcoder/output
database_path: /data/transcoder/transcoder.db
lockfile_path: /var/run/transcoder.lock
log_dir: /var/log/transcoder
encoder_preference: auto
profile: quality
cq_value: 25
cpu_crf_equivalent: 23
min_size_gb: 6.0
bitrate:
  target_mbps: 40
  max_mbps: 60
  bufsize_mbps: 120
stability:
  poll_interval_sec: 300
  checks_required: 3
  min_age_sec: 900
stability_profiles:
  bulk:
    poll_interval_sec: 60
    checks_required: 1
    min_age_sec: 0
  steady:
    poll_interval_sec: 300
    checks_required: 3
    min_age_sec: 900
concurrency:
  scan_interval_sec: 600
  download_workers: 2
  transcode_workers: 2
  upload_workers: 2
watchdog:
  download_timeout_sec: 7200
  transcode_timeout_sec: 86400
  upload_timeout_sec: 7200
  max_retries: 10
dispatcher:
  poll_interval_sec: 2.0
  queue_multiplier: 4
scanner:
  cursor_checkpoint_entries: 500
  feito_cache_ttl_sec: 3600
disk_budget:
  enabled: false
  max_staging_bytes: 2000000000000
  min_free_bytes: 500000000000
  poll_interval_sec: 30
api:
  enabled: true
  bind: 127.0.0.1
  port: 9123
updater:
  enabled: true
  github_repo: luisimperator/rep01
  check_timeout_sec: 5.0
dropbox_api:
  rate_per_min: 600
  burst: 50
output_layout: sibling
output_mirror_root: _h265_output
video_extensions:
- .mp4
- .mov
- .MP4
- .MOV
exclude_patterns:
- '*/h265/*'
- '*/.h265/*'
- '*/H265/*'
- '*/h264/*'
- '*/H264/*'
upload_to_dropbox: true
delete_staging_after_upload: true
# legacy_reorganize: when true, after each successful upload the daemon moves
# the original H.264 to <parent>/h264/<name> and moves the H.265 to <parent>/<name>
# so the H.265 takes the original's place. Replicates the legacy GUI workflow.
# Also appends to <parent>/h265/h265 feito.txt.
legacy_reorganize: true
# Skip reorganization for folders with any user activity in the last N days.
# Files modified more recently than this are assumed to be in active projects;
# the H.265 stays in /h265/ subfolder until the project goes quiet, and a future
# `hd reorganize-existing` pass picks it up. 0 = always reorganize, no filter.
legacy_reorganize_min_age_days: 60
allow_delete_original: false
delete_original_delay_hours: 168
allow_mkv_fallback: false
ffmpeg_path: ffmpeg
ffprobe_path: ffprobe
ffmpeg_extra_args: []
gop_size: 60
audio_fallback_codec: aac
audio_fallback_bitrate: 320k
