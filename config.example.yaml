# HeavyDrops Transcoder — example configuration.
#
# Copy this file to config.yaml and edit. Either short-lived or refresh-token
# auth is required (see below).
#
# Auth, two modes:
#   1) Refresh token (recommended for the daemon — runs forever, never expires):
#      Run `hd auth` once. It walks you through Dropbox OAuth and writes
#      dropbox_app_key + dropbox_refresh_token here.
#   2) Short-lived access token (legacy / ad-hoc, ~4h lifetime):
#      Generate one at https://www.dropbox.com/developers/apps and paste it
#      into dropbox_token. The daemon will die when the token expires.
#
# dropbox_root:   a VIRTUAL path inside your Dropbox account (starts with "/").
#                 Use "/" to process your entire Dropbox, or "/Videos" etc.
#                 This is NOT your local Dropbox folder on disk.
# local_*_dir:    local paths on THIS machine. On Windows keep forward slashes
#                 (e.g. C:/Users/you/HeavyDrops/data/staging) to avoid YAML
#                 escape issues, or quote the path with single quotes.
# output_layout:  "sibling" writes next to each source folder at .../h265/name.mp4
#                 (legacy, default). "mirror" mirrors the tree under a single
#                 root folder — recommended for large archives with sibling
#                 folders that share filenames.
# disk_budget.enabled: flip to true when staging disk is a bottleneck (e.g.
#                 few TB local disk pointed at a huge Dropbox).

dropbox_token: ${DROPBOX_TOKEN}
dropbox_app_key: ''
dropbox_app_secret: ''
dropbox_refresh_token: ${DROPBOX_REFRESH_TOKEN}
dropbox_root: /Videos
local_staging_dir: /data/transcoder/staging
local_output_dir: /data/transcoder/output
database_path: /data/transcoder/transcoder.db
lockfile_path: /var/run/transcoder.lock
log_dir: /var/log/transcoder
encoder_preference: auto
profile: quality
cq_value: 25
cpu_crf_equivalent: 23
min_size_gb: 6.0
bitrate:
  target_mbps: 40
  max_mbps: 60
  bufsize_mbps: 120
stability:
  poll_interval_sec: 300
  checks_required: 3
  min_age_sec: 900
stability_profiles:
  bulk:
    poll_interval_sec: 60
    checks_required: 1
    min_age_sec: 0
  steady:
    poll_interval_sec: 300
    checks_required: 3
    min_age_sec: 900
concurrency:
  scan_interval_sec: 600
  download_workers: 2
  transcode_workers: 2
  upload_workers: 2
  audio_workers: 2
watchdog:
  download_timeout_sec: 7200
  transcode_timeout_sec: 86400
  upload_timeout_sec: 7200
  max_retries: 10
dispatcher:
  poll_interval_sec: 2.0
  queue_multiplier: 4
scanner:
  cursor_checkpoint_entries: 500
  feito_cache_ttl_sec: 3600
disk_budget:
  enabled: false
  max_staging_bytes: 2000000000000
  min_free_bytes: 1200000000000
  poll_interval_sec: 30
api:
  enabled: true
  bind: 127.0.0.1
  port: 9123
updater:
  enabled: true
  github_repo: luisimperator/rep01
  check_timeout_sec: 5.0
dropbox_api:
  rate_per_min: 600
  burst: 50
output_layout: sibling
output_mirror_root: _h265_output
video_extensions:
- .mp4
- .mov
- .MP4
- .MOV
exclude_patterns:
- '*/h265/*'
- '*/.h265/*'
- '*/H265/*'
- '*/h264/*'
- '*/H264/*'
# /assets/ holds project resources (LUTs, plates, fonts, graphics).
# Never transcode anything in there.
- '*/assets/*'
- '*/Assets/*'
upload_to_dropbox: true
delete_staging_after_upload: true
# legacy_reorganize: when true, after each successful upload the daemon moves
# the original H.264 to <parent>/h264/<name> and moves the H.265 to <parent>/<name>
# so the H.265 takes the original's place. Replicates the legacy GUI workflow.
# Also appends to <parent>/h265/h265 feito.txt.
legacy_reorganize: true
# Skip reorganization for folders with any user activity in the last N days.
# Files modified more recently than this are assumed to be in active projects;
# the H.265 stays in /h265/ subfolder until the project goes quiet, and a future
# `hd reorganize-existing` pass picks it up. 0 = always reorganize, no filter.
legacy_reorganize_min_age_days: 60
# After a per-folder reorganize batch succeeds, schedule deletion of the
# /h264 backup folder this many seconds later. Default 0 = keep the backups
# forever. Dropbox version history (30d Plus, 180d Business) covers recovery.
legacy_reorganize_delete_h264_after_seconds: 0
# Same as above but for the /wav backup folder the audio pipeline produces.
# Default 300 = 5 minutes — keep just long enough to confirm the MP3 is fine.
legacy_reorganize_delete_wav_after_seconds: 300

# After every successful per-folder reorganize batch, sweep `._*` macOS
# resource-fork files (4 KB Finder metadata that the ATEM scatters around)
# into a `<parent>/ponto tracinho/` quarantine subfolder, then schedule
# deletion of that subfolder. Best-effort housekeeping — failures don't
# abort the pipeline. Quarantined files are recoverable via Dropbox
# version history.
cleanup_dot_underscore: true
cleanup_dot_underscore_delete_after_seconds: 300
# Run a recursive sweep across dropbox_root every N scans to catch ._
# files that arrived AFTER a per-folder reorganize batch already ran.
# 0 disables the periodic sweep (only per-batch + manual trigger via
# the dashboard "Sweep ._ now" button will clean). Default 1 = every scan.
cleanup_dot_underscore_sweep_every_n_scans: 1

# DANGER: when ON, sources with 4:2:2 chroma keep 4:2:2 on output.
# Forces libx265 (CPU) for those jobs because QSV / NVENC consumer
# hardware does not implement HEVC Main 4:2:2. Encoding is roughly
# 10x slower (4K 10-bit 4:2:2 ~0.1-0.2x real-time on a strong CPU).
# Default OFF: all output goes 4:2:0 main10 / main12 — fast on QSV.
# Flip ON only for masters that need chroma fidelity (graphics, key).
preserve_chroma_422: false

# Skip files whose video bitrate per megapixel is below this threshold.
# Catches YouTube downloads / streaming-grade files where re-transcoding
# to H.265 either bloats the file or burns compute for trivial savings.
# Scales with resolution: 1080p (~2 MP) skips below ~6 Mbps; 4K (~8 MP)
# skips below ~25 Mbps. Set to 0 to disable. Job is marked
# SKIPPED_LOW_BITRATE — no transcode, no upload, no reorganize.
low_bitrate_skip_mbps_per_megapixel: 3.0
# Cleanup is scoped to these folder names (case-insensitive, last path
# segment match). ATEM writes resource forks specifically into these.
dot_underscore_target_folder_names:
  - "Video ISO Files"
  - "Audio Source Files"
# Skip ._ files larger than this. Real macOS resource forks are ~4 KB;
# 10 KB is generous headroom while still skipping anything that looks
# like real data accidentally prefixed with `._`.
dot_underscore_max_size_bytes: 10240

# WAV → MP3 192kbps pipeline. CPU-only (libmp3lame), runs in parallel with
# the QSV/NVENC video transcoder so they don't compete for the encoder.
# Discovery is locked to folders named exactly 'Audio Source Files'
# (case-insensitive) — the layout the ATEM hardware writes.
audio:
  enabled: true
  source_folder_name: "Audio Source Files"
  bitrate_kbps: 192
  extensions: [".wav"]

# Range-download N MB from the head/tail of each candidate before the full
# download to detect natively-encoded H.265 files via ffprobe. When detected,
# the full download is skipped and the job is marked SKIPPED_HEVC. 0 disables.
preflight_hevc_probe_mb: 16
allow_delete_original: false
delete_original_delay_hours: 168
allow_mkv_fallback: false
ffmpeg_path: ffmpeg
ffprobe_path: ffprobe
ffmpeg_extra_args: []
gop_size: 60
audio_fallback_codec: aac
audio_fallback_bitrate: 320k
